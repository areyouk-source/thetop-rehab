<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d5b8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8b896;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6d0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4c4a0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="inflameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85555;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#c03030;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="640" height="400" fill="#f8f6f2" rx="8"/>

  <!-- 제목 -->
  <text x="320" y="34" text-anchor="middle" font-size="15" font-weight="500" fill="#1a2744" letter-spacing="1">손목 첫 번째 터널 — 드퀘르벵 발생 부위</text>
  <line x1="120" y1="42" x2="520" y2="42" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ── 손목 단면도 (좌측) ── -->
  <g transform="translate(60, 60)">

    <!-- 단면도 제목 -->
    <text x="120" y="18" text-anchor="middle" font-size="12" fill="#8a9ab0" letter-spacing="0.5">손목 횡단면</text>

    <!-- 피부 외곽 -->
    <ellipse cx="120" cy="170" rx="105" ry="130" fill="url(#skinGrad)" stroke="#d4956a" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- 내부 구조 배경 -->
    <ellipse cx="120" cy="170" rx="88" ry="112" fill="#fdf6ee" stroke="#e0c8a0" stroke-width="1"/>

    <!-- 뼈 구조들 (수근골) -->
    <ellipse cx="82" cy="148" rx="22" ry="18" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.2"/>
    <ellipse cx="122" cy="142" rx="20" ry="17" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.2"/>
    <ellipse cx="160" cy="148" rx="20" ry="18" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.2"/>
    <ellipse cx="90" cy="188" rx="20" ry="16" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.2"/>
    <ellipse cx="128" cy="186" rx="20" ry="16" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.2"/>
    <ellipse cx="158" cy="188" rx="18" ry="16" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.2"/>

    <!-- 뼈 라벨 -->
    <text x="120" y="173" text-anchor="middle" font-size="9.5" fill="#8a7050">수근골</text>

    <!-- 힘줄들 (2~6번 터널) — 배경 -->
    <!-- 터널 2 -->
    <ellipse cx="168" cy="100" rx="10" ry="8" fill="#c8dff0" stroke="#7aabcc" stroke-width="1" opacity="0.7"/>
    <!-- 터널 3 -->
    <ellipse cx="148" cy="88" rx="8" ry="7" fill="#c8dff0" stroke="#7aabcc" stroke-width="1" opacity="0.7"/>
    <!-- 터널 4 -->
    <ellipse cx="120" cy="82" rx="14" ry="8" fill="#c8dff0" stroke="#7aabcc" stroke-width="1" opacity="0.7"/>
    <!-- 터널 5 -->
    <ellipse cx="95" cy="88" rx="8" ry="7" fill="#c8dff0" stroke="#7aabcc" stroke-width="1" opacity="0.7"/>
    <!-- 터널 6 -->
    <ellipse cx="78" cy="98" rx="9" ry="8" fill="#c8dff0" stroke="#7aabcc" stroke-width="1" opacity="0.7"/>

    <!-- ★ 1번 터널 (드퀘르벵) — 강조 -->
    <!-- 터널 외막 (염증) -->
    <ellipse cx="186" cy="118" rx="18" ry="14" fill="#fde8e8" stroke="#e85555" stroke-width="2" filter="url(#glow)"/>
    <!-- APL 힘줄 -->
    <ellipse cx="181" cy="114" rx="7" ry="6" fill="#e85555" stroke="#c03030" stroke-width="1.2"/>
    <!-- EPB 힘줄 -->
    <ellipse cx="191" cy="122" rx="6" ry="5" fill="#e85555" stroke="#c03030" stroke-width="1.2"/>
    <!-- 1번 라벨 배지 -->
    <rect x="172" y="102" width="16" height="14" rx="7" fill="#1a2744"/>
    <text x="180" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="white">1</text>

    <!-- 번호 라벨 (2~6) -->
    <text x="168" y="97" text-anchor="middle" font-size="9" fill="#4a6a8a">2</text>
    <text x="148" y="85" text-anchor="middle" font-size="9" fill="#4a6a8a">3</text>
    <text x="120" y="79" text-anchor="middle" font-size="9" fill="#4a6a8a">4</text>
    <text x="95" y="85" text-anchor="middle" font-size="9" fill="#4a6a8a">5</text>
    <text x="78" y="95" text-anchor="middle" font-size="9" fill="#4a6a8a">6</text>

    <!-- 피부 표면 레이블 -->
    <text x="120" y="292" text-anchor="middle" font-size="10" fill="#8a9ab0">손등 방향 →</text>

    <!-- 엄지 방향 화살표 -->
    <line x1="196" y1="135" x2="220" y2="155" stroke="#e85555" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="222" y="165" font-size="9.5" fill="#e85555">엄지 쪽</text>

  </g>

  <!-- ── 측면 해부도 (우측) ── -->
  <g transform="translate(340, 55)">

    <text x="130" y="18" text-anchor="middle" font-size="12" fill="#8a9ab0" letter-spacing="0.5">손목 측면 — 1번 터널 위치</text>

    <!-- 요골 (뼈) -->
    <rect x="30" y="60" width="48" height="230" rx="10" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.5"/>
    <text x="54" y="185" text-anchor="middle" font-size="10" fill="#8a7050" transform="rotate(-90,54,185)">요골 (Radius)</text>

    <!-- 손목 관절 영역 -->
    <ellipse cx="54" cy="290" rx="28" ry="16" fill="#e8d8b8" stroke="#b8a070" stroke-width="1.2"/>

    <!-- 수근골들 -->
    <rect x="72" y="265" width="80" height="50" rx="8" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.2"/>
    <text x="112" y="295" text-anchor="middle" font-size="9.5" fill="#8a7050">수근골</text>

    <!-- 중수골 (손가락 쪽) -->
    <rect x="152" y="250" width="80" height="30" rx="6" fill="url(#boneGrad)" stroke="#b8a070" stroke-width="1.2" opacity="0.8"/>
    <text x="192" y="270" text-anchor="middle" font-size="9" fill="#8a7050">중수골</text>

    <!-- APL 힘줄 경로 -->
    <path d="M 30 180 Q 80 240 120 275 Q 155 295 200 285"
          fill="none" stroke="#e85555" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <!-- EPB 힘줄 경로 -->
    <path d="M 30 165 Q 80 225 120 262 Q 155 280 200 270"
          fill="none" stroke="#c03030" stroke-width="4" stroke-linecap="round" opacity="0.75"/>

    <!-- 1번 터널 표시 (염증 부위) -->
    <ellipse cx="98" cy="255" rx="26" ry="16" fill="rgba(232,85,85,0.15)" stroke="#e85555" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- 터널 화살표 -->
    <line x1="98" y1="238" x2="98" y2="210" stroke="#e85555" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 터널 라벨 박스 -->
    <rect x="62" y="188" width="72" height="20" rx="4" fill="#1a2744"/>
    <text x="98" y="202" text-anchor="middle" font-size="10" fill="white" font-weight="500">1번 터널</text>

    <!-- 피부 외곽선 -->
    <path d="M 20 55 Q 20 55 20 300 Q 20 330 54 340 Q 90 345 152 340 Q 200 335 240 320 L 240 300 Q 200 310 152 315 Q 90 318 54 310 Q 28 305 28 300 L 28 60 Z"
          fill="rgba(245,213,184,0.25)" stroke="#d4956a" stroke-width="1.2"/>

    <!-- 힘줄 범례 -->
    <rect x="10" y="118" width="10" height="5" rx="2" fill="#e85555"/>
    <text x="24" y="125" font-size="9.5" fill="#4a5568">APL (장무지외전건)</text>
    <rect x="10" y="132" width="10" height="5" rx="2" fill="#c03030"/>
    <text x="24" y="139" font-size="9.5" fill="#4a5568">EPB (단무지신건)</text>

    <!-- 압통점 표시 -->
    <circle cx="98" cy="255" r="6" fill="none" stroke="#e85555" stroke-width="2"/>
    <circle cx="98" cy="255" r="3" fill="#e85555"/>
    <text x="115" y="260" font-size="9.5" fill="#e85555" font-weight="500">압통점</text>

  </g>

  <!-- ── 하단 설명 ── -->
  <rect x="40" y="350" width="560" height="38" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="62" cy="369" r="8" fill="#1a2744"/>
  <text x="62" y="373" text-anchor="middle" font-size="9" fill="white" font-weight="600">1</text>
  <text x="80" y="366" font-size="10.5" fill="#1a2744" font-weight="500">1번 터널 — APL·EPB 힘줄 통과 구간</text>
  <text x="80" y="380" font-size="9.5" fill="#8a9ab0">반복 사용으로 터널 내 염증 발생 → 드퀘르벵병 (손목건초염)</text>
  <circle cx="330" cy="362" r="5" fill="#e85555" opacity="0.8"/>
  <text x="342" y="366" font-size="10" fill="#e85555">염증·통증 발생 부위</text>

  <!-- 저작권 -->
  <text x="600" y="395" text-anchor="end" font-size="8.5" fill="#c0c8d0">더탑재활의학과의원</text>
</svg>
